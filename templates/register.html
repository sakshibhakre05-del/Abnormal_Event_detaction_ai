<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AI CCTV Surveillance</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&family=Inter:wght@400;500&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: #020617;
            color: #fff;
            position: relative;
            overflow: hidden;
        }

        /* Ambient background */
        body::before {
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(56, 189, 248, 0.1) 0%, transparent 50%);
            z-index: -1;
        }

        .back-link {
            position: absolute;
            top: 40px;
            left: 40px;
            color: #94a3b8;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
            font-weight: 500;
            transition: all 0.3s;
            z-index: 10;
        }

        .back-link:hover {
            color: #38bdf8;
            transform: translateX(-5px);
        }

        .container {
            background: rgba(15, 23, 42, 0.6);
            border-radius: 24px;
            padding: 50px;
            width: 100%;
            max-width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.6s ease-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .container h2 {
            margin: 0 0 10px 0;
            font-size: 32px;
            font-weight: 700;
            font-family: 'Outfit', sans-serif;
            text-align: center;
            background: linear-gradient(to bottom, #fff, #94a3b8);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .container p {
            text-align: center;
            color: #94a3b8;
            margin-bottom: 40px;
        }

        .form-group {
            margin-bottom: 25px;
        }

        .form-group label {
            display: block;
            margin-bottom: 10px;
            font-size: 14px;
            color: #cbd5e1;
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 14px 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
            color: #fff;
            font-size: 16px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .form-group input:focus {
            background: rgba(255, 255, 255, 0.05);
            border-color: #38bdf8;
            box-shadow: 0 0 0 4px rgba(56, 189, 248, 0.1);
        }

        button {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #38bdf8, #2563eb);
            color: white;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
            box-shadow: 0 10px 20px rgba(37, 99, 235, 0.2);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 30px rgba(37, 99, 235, 0.4);
        }

        .footer {
            margin-top: 30px;
            text-align: center;
            font-size: 15px;
            color: #94a3b8;
        }

        .footer a {
            color: #38bdf8;
            text-decoration: none;
            font-weight: 600;
            margin-left: 5px;
        }

        .footer a:hover {
            text-decoration: underline;
        }

        /* ---------------- TOAST NOTIFICATIONS (WAVE ANIMATION) ---------------- */
        .toast-container {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 1000;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: linear-gradient(135deg, rgba(239, 68, 68, 0.9), rgba(153, 27, 27, 0.9));
            color: white;
            padding: 16px 24px;
            border-radius: 8px;
            font-weight: 600;
            font-size: 15px;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 10px 30px rgba(239, 68, 68, 0.4);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            /* Creative Wave Animation */
            transform-origin: right center;
            animation: waveSlideIn 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards, fadeOut 0.5s ease-in 4.5s forwards;
            opacity: 0;
        }

        @keyframes waveSlideIn {
            0% {
                transform: translateX(100%) scaleX(0.5);
                opacity: 0;
            }

            50% {
                transform: translateX(-5%) scaleX(1.1);
                opacity: 1;
            }

            100% {
                transform: translateX(0) scaleX(1);
                opacity: 1;
            }
        }

        @keyframes fadeOut {
            0% {
                opacity: 1;
                transform: translateY(0);
            }

            100% {
                opacity: 0;
                transform: translateY(-20px);
                display: none;
            }
        }

        .toast-icon {
            font-size: 20px;
            animation: waveBounce 2s infinite;
        }

        @keyframes waveBounce {

            0%,
            20%,
            50%,
            80%,
            100% {
                transform: translateY(0) rotate(0deg);
            }

            40% {
                transform: translateY(-8px) rotate(-15deg);
            }

            60% {
                transform: translateY(-4px) rotate(10deg);
            }
        }
    </style>
    <script>
        function validateName() {
            const name = document.getElementById("name").value;
            const regex = /^[A-Za-z ]+$/;

            if (!regex.test(name)) {
                alert("Name must contain only alphabets");
                return false;
            }
            return true;
        }
    </script>
</head>

<body>
    <a href="/" class="back-link">
        <span>←</span> Back to Home
    </a>

    <!-- Flash Messages -->
    {% with messages = get_flashed_messages(category_filter=["error"]) %}
    {% if messages %}
    <div class="toast-container">
        {% for message in messages %}
        <div class="toast">
            <div class="toast-icon">🌊</div>
            <div class="toast-message">{{ message }}</div>
        </div>
        {% endfor %}
    </div>
    {% endif %}
    {% endwith %}

    <div class="container">
        <h2>Create Account</h2>
        <p>Join the future of smart surveillance.</p>

        <form method="POST" onsubmit="return validateName()">
            <div class="form-group">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" required placeholder="Enter your full name">
            </div>

            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" required placeholder="you@example.com">
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required placeholder="••••••••">
            </div>

            <button type="submit">Register</button>
        </form>

        <div class="footer">
            Already have an account? <a href="/login">Log in here</a>
        </div>
    </div>
</body>

</html>
